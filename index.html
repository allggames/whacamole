<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de los Topos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>¡Golpea al Topo!</h1>
    <h2>Puntuación: <span id="score">0</span></h2>
    <h2>Tiempo restante: <span id="time-left">30</span>s</h2>

    <div class="grid">
        <div class="hole" id="1"></div>
        <div class="hole" id="2"></div>
        <div class="hole" id="3"></div>
        <div class="hole" id="4"></div>
        <div class="hole" id="5"></div>
        <div class="hole" id="6"></div>
        <div class="hole" id="7"></div>
        <div class="hole" id="8"></div>
        <div class="hole" id="9"></div>
    </div>

    <button id="start-btn">Iniciar Juego</button>

    <script src="script.js"></script>
</body>
</html>
