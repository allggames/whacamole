<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de los Topos - Casino Atenea</title>

    <!-- Fuente Lexend de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pantalla de Carga (Splash Screen) -->
    <div id="loader-screen">
        <div class="loader-content">
            <img src="logo.png" alt="Casino Atenea" class="loader-logo">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <p id="loader-text">Cargando juego... 0%</p>
        </div>
    </div>

    <h1>¡Golpea al Topo!</h1>
    <h2>Puntuación: <span id="score">0</span></h2>
    <h2>Tiempo restante: <span id="time-left">15</span>s</h2>

    <div class="grid">
        <div class="hole" id="1"></div>
        <div class="hole" id="2"></div>
        <div class="hole" id="3"></div>
        <div class="hole" id="4"></div>
        <div class="hole" id="5"></div>
        <div class="hole" id="6"></div>
        <div class="hole" id="7"></div>
        <div class="hole" id="8"></div>
        <div class="hole" id="9"></div>
    </div>

    <button id="start-btn">Iniciar Juego</button>

    <!-- Avisos de bono durante la partida -->
    <div id="bonus-toast" class="toast hidden">
        <span id="bonus-text">¡Bono de 50%!</span>
    </div>

    <!-- Cartel Final de Recompensa -->
    <div id="final-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="final-title">¡FELICITACIONES!</h2>
            <p id="final-message">Te ganaste un bono del 0%</p>
            <p id="final-datetime" class="datetime-text"></p>
            <a id="claim-btn" href="https://casinoatenea.club/" target="_blank" rel="noopener noreferrer">Captura y reclamá</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
